version: "1.0"
name: pipeline-20260607
displayName: gitee-release
triggers:
  trigger: auto
  push:
    tags:
      prefix:
        - v
variables:
  GOPROXY: https://goproxy.cn,direct
  GOTOOLCHAIN: auto
  GOSUMDB: sum.golang.google.cn
stages:
  - name: stage-02a7a941
    displayName: golangbuild
    strategy: fast
    trigger: auto
    executor: []
    steps:
      - step: build@golang
        name: build_golang
        displayName: Golang 构建
        golangVersion: "1.25"
        commands:
          - command -v zip >/dev/null 2>&1 || apt-get install -y zip
          - bash scripts/gitee-release.sh
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./output
        caches:
          - /go/pkg/mod
        notify: []
        strategy:
          retry: "0"
